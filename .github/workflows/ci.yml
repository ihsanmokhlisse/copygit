name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.24"
  COVERAGE_THRESHOLD: "35"

jobs:
  # ─── Stage 1: Fast feedback (< 30s) ──────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go build -o /dev/null ./cmd/copygit

  # ─── Stage 2: Unit tests (parallel by tier) ──────────────────────────────
  test-tier1:
    name: "Test: Pure Logic"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go test -count=1 ./internal/model/... ./internal/git/... ./internal/output/...

  test-tier2:
    name: "Test: File I/O"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go test -count=1 ./internal/config/... ./internal/credential/... ./internal/daemon/... ./internal/lock/...

  test-tier3:
    name: "Test: External"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go test -count=1 ./internal/provider/... ./internal/sync/... ./internal/hook/...

  # ─── Stage 3: Race detection + coverage (after all tests pass) ───────────
  race:
    name: Race Detector
    runs-on: ubuntu-latest
    needs: [test-tier1, test-tier2, test-tier3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go test -race -count=1 ./internal/lock/... ./internal/sync/... ./internal/daemon/...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test-tier1, test-tier2, test-tier3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests with coverage
        run: go test -coverprofile=cover.out -covermode=atomic ./...

      - name: Check coverage threshold
        env:
          THRESHOLD: ${{ env.COVERAGE_THRESHOLD }}
        run: |
          TOTAL=$(go tool cover -func=cover.out | tail -1 | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          if (( $(echo "$TOTAL < $THRESHOLD" | bc -l) )); then
            echo "::error::Coverage ${TOTAL}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cover.out
