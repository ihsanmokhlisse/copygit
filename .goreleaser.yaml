project_name: copygit
version: 2

release:
  github:
    owner: ihsanmokhlisse
    name: copygit
  draft: false
  prerelease: auto

builds:
  - id: copygit
    main: ./cmd/copygit
    binary: copygit
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.Version={{ .Version }} -X main.Commit={{ .ShortCommit }} -X main.Date={{ .Date }}

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
  groups:
    - title: Features
      regexp: "^.*feat.*$"
      order: 0
    - title: Bug Fixes
      regexp: "^.*fix.*$"
      order: 1
    - title: Other
      order: 999

brews:
  - repository:
      owner: ihsanmokhlisse
      name: homebrew-tap
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://ihsanmokhlisse.github.io/copygit/"
    description: "Multi-provider Git sync — mirror repos to GitHub, GitLab, Gitea, and any Git server"
    license: "MIT"
    install: |
      bin.install "copygit"
    test: |
      system "#{bin}/copygit", "version"
    dependencies:
      - name: git

dockers: []
